    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />
    
    <!-- Google Analytics 4 with Consent Mode v2 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_MEASUREMENT_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      // Default all storage to DENIED until the visitor consents via the
      // cookie banner. GA still loads but stores no cookies (cookieless pings)
      // until consent is granted — the compliant default.
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        wait_for_update: 500
      });

      // If the visitor already made a choice on a previous visit, apply it now.
      try {
        var c = JSON.parse(localStorage.getItem('nexdyne_cookie_consent') || 'null');
        if (c) {
          gtag('consent', 'update', {
            analytics_storage: c.analytics ? 'granted' : 'denied',
            ad_storage: c.marketing ? 'granted' : 'denied',
            ad_user_data: c.marketing ? 'granted' : 'denied',
            ad_personalization: c.marketing ? 'granted' : 'denied'
          });
        }
      } catch (e) {}

      gtag('js', new Date());
      gtag('config', '%VITE_GA_MEASUREMENT_ID%');
    </script>
  </head>
